name: Build and deploy the combined site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install MkDocs dependencies
        run: pip install -r requirements.txt

      - name: Type-check Astro
        run: npm run check

      - name: Build Astro, Notes, CNAME, and Pagefind
        run: npm run build

      - name: Verify links and content contracts
        run: npm run test:links && npm run test:content

      - name: Upload combined build
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: combined-site
          path: dist
          if-no-files-found: error

      - name: Deploy dist to gh-pages root
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          cname: www.allenge.me
          force_orphan: true
